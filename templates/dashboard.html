<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f7fb;
            padding:30px;
        }

        .topbar{
            background:#1f3c88;
            color:white;
            padding:20px;
            border-radius:12px;
            margin-bottom:25px;
        }

        .topbar h1{
            font-size:28px;
        }

        .topbar p{
            margin-top:8px;
            font-size:16px;
        }

        .cards{
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:20px;
            margin-bottom:30px;
        }
        .card small{
             display:block;
             margin-top:8px;
             font-size:16px;
             font-weight:bold;
             color:#444;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:14px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
            text-align:center;
        }

        .card h3{
            color:#555;
            margin-bottom:10px;
            font-size:18px;
        }

        .card p{
            font-size:28px;
            font-weight:bold;
            color:#1f3c88;
        }

        .chart-box{
            background:white;
            padding:25px;
            border-radius:14px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
        }

        @media(max-width: 900px){
            .cards{
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width: 600px){
            .cards{
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="/logout" style="color:white; text-decoration:none; float:right; background:#d9534f; padding:8px 14px; border-radius:8px;">Logout</a>
        <h1>Welcome, {{ data.name }}</h1>
        <p>Your personal result analysis dashboard</p>
    </div>

    <div class="cards">
    <div class="card">
        <h3>C++</h3>
        <p>{{ data.cpp }}</p>
        <small>{{ data.cpp_status }}</small>
    </div>
    <div class="card">
        <h3>Java</h3>
        <p>{{ data.java }}</p>
        <small>{{ data.java_status }}</small>
    </div>
    <div class="card">
        <h3>Aptitude</h3>
        <p>{{ data.aptitude }}</p>
        <small>{{ data.aptitude_status }}</small>
    </div>
    <div class="card">
        <h3>DSA</h3>
        <p>{{ data.dsa }}</p>
        <small>{{ data.dsa_status }}</small>
    </div>
</div>
    <div class="chart-box">
        <h2 style="margin-bottom:20px;">Performance Chart</h2>
        <canvas id="marksChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('marksChart');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['C++', 'Java', 'Aptitude', 'DSA'],
                datasets: [{
                    label: 'Marks',
                    data: [
                        {{ data.cpp }},
                        {{ data.java }},
                        {{ data.aptitude }},
                        {{ data.dsa }}
                    ]
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });
    </script>

</body>
</html>
